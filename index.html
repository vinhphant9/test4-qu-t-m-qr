<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét Mã QR - Phiên bản MỚI (Hoạt động tốt hơn)</title>
    <!-- Thư viện html5-qrcode (đáng tin cậy hơn jsQR rất nhiều) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border: 2px solid #4CAF50; }
        ul { list-style-type: none; padding: 0; max-width: 500px; margin: 20px auto; }
        li { margin: 8px; padding: 10px; border: 1px solid #ddd; background: #f9f9f9; }
        button { padding: 12px 25px; margin: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #45a049; }
        .note { background: #fff3cd; padding: 15px; border-radius: 8px; margin: 20px auto; max-width: 600px; }
    </style>
</head>
<body>
    <h1>📱 Quét Mã QR</h1>
    
    <div class="note">
        <strong>Lưu ý quan trọng:</strong><br>
        Bạn PHẢI mở file HTML này qua <strong>localhost</strong> (không được mở trực tiếp file.html).<br>
        Cách nhanh nhất: Dùng VS Code + Live Server hoặc chạy lệnh:<br>
        <code>python -m http.server 8000</code> rồi truy cập http://localhost:8000
    </div>

    <div id="reader"></div>

    <button id="complete" style="display: none;">✅ Hoàn thành & Tải file XLSX</button>

    <h2>Danh sách mã đã quét (<span id="count">0</span>)</h2>
    <ul id="list"></ul>

    <script>
        let scannedCodes = [];
        let lastScanned = null;
        let scanner;

        // Phát âm thanh beep
        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), 150);
        }

        // Thêm vào danh sách
        function addToList(code) {
            const now = new Date();
            const stt = scannedCodes.length + 1;
            const item = {
                stt: stt,
                time: now.toLocaleString('vi-VN'),
                code: code
            };
            scannedCodes.push(item);

            const li = document.createElement('li');
            li.innerHTML = `<strong>STT ${item.stt}</strong> | ${item.time} | <strong>${item.code}</strong>`;
            document.getElementById('list').appendChild(li);
            document.getElementById('count').textContent = stt;
        }

        // Callback khi quét thành công
        function onScanSuccess(decodedText) {
            if (decodedText === lastScanned) return; // Tránh lặp lại mã giống nhau

            playBeep();
            addToList(decodedText);
            lastScanned = decodedText;

            // Cho phép quét lại cùng mã sau 2 giây
            setTimeout(() => { lastScanned = null; }, 2000);
        }

        function onScanError(errorMessage) {
            // Không cần hiển thị lỗi nhỏ
        }

        // Khởi tạo scanner
        function startScanner() {
            scanner = new Html5QrcodeScanner(
                "reader",
                {
                    fps: 15,
                    qrbox: { width: 280, height: 280 },
                    aspectRatio: 1.0,
                    showTorchButtonIfSupported: true,
                    rememberLastUsedCamera: true
                },
                false
            );

            scanner.render(onScanSuccess, onScanError);

            // Hiển thị nút hoàn thành
            document.getElementById('complete').style.display = 'inline-block';
        }

        // Nút Hoàn thành
        document.getElementById('complete').addEventListener('click', () => {
            if (scannedCodes.length === 0) {
                alert('Chưa có mã nào được quét!');
                return;
            }

            // Dừng scanner
            if (scanner) scanner.clear();

            // Tạo file XLSX
            const ws = XLSX.utils.json_to_sheet(scannedCodes.map(item => ({
                'Số thứ tự': item.stt,
                'Ngày giờ': item.time,
                'Mã đơn': item.code
            })));

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Danh sách QR');

            XLSX.writeFile(wb, `danh_sach_ma_qr_${new Date().toISOString().slice(0,10)}.xlsx`);

            alert('✅ File đã được tải xuống thành công!');
        });

        // Bắt đầu ngay khi tải trang
        window.onload = startScanner;
    </script>
</body>
</html>
