<script>

const status = document.getElementById('status');
const reader = document.getElementById('reader');
const menuContainer = document.getElementById('menu-container');
const qrListContainer = document.getElementById('qr-list-container');
const qrList = document.getElementById('qr-list');
const completeButton = document.getElementById('complete');

let html5QrCode;
let scannedCodes = [];
let scannedSet = new Set();

let returnCodes = [];
let returnSet = new Set();

let currentMode = '';

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function createBeep() {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.frequency.value = 1000;
    gainNode.gain.value = 0.5;

    oscillator.start();

    setTimeout(() => {
        oscillator.stop();
    },200);
}

function startScanner(){

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps:10,
        qrbox:{width:250,height:250}
    };

    html5QrCode.start(
        {facingMode:"environment"},
        config,
        onScanSuccess
    );

}

document.getElementById('btn-quet-ma-don').onclick = () => {

    currentMode = "don";

    scannedCodes = [];
    scannedSet.clear();

    qrList.innerHTML="";

    menuContainer.style.display="none";
    reader.style.display="block";
    status.style.display="block";
    qrListContainer.style.display="block";

    completeButton.style.display="inline-block";

    status.textContent="Quét mã đơn";

    startScanner();

};

document.getElementById('btn-quet-don-hoan').onclick = () => {

    currentMode = "hoan";

    returnCodes = [];
    returnSet.clear();

    qrList.innerHTML="";

    menuContainer.style.display="none";
    reader.style.display="block";
    status.style.display="block";
    qrListContainer.style.display="block";

    completeButton.style.display="inline-block";

    status.textContent="Quét đơn hoàn";

    startScanner();

};

function onScanSuccess(decodedText){

    if(currentMode==="don"){

        if(scannedSet.has(decodedText)) return;

        scannedSet.add(decodedText);

        createBeep();

        const now = new Date();

        const item = {
            stt:scannedCodes.length+1,
            time:now.toLocaleString('vi-VN'),
            code:decodedText
        };

        scannedCodes.push(item);

        addToList(item);

    }

    if(currentMode==="hoan"){

        if(returnSet.has(decodedText)) return;

        returnSet.add(decodedText);

        createBeep();

        const now = new Date();

        const item = {
            stt:returnCodes.length+1,
            time:now.toLocaleString('vi-VN'),
            code:decodedText
        };

        returnCodes.push(item);

        addToList(item);

    }

}

function addToList(item){

    const li = document.createElement("li");

    li.textContent = `${item.stt} | ${item.time} | ${item.code}`;

    qrList.appendChild(li);

}

completeButton.onclick = ()=>{

    let data;
    let filename;

    if(currentMode==="don"){

        data = scannedCodes;
        filename = "ma_don.xlsx";

    }else{

        data = returnCodes;
        filename = "don_hoan.xlsx";

    }

    if(data.length===0){

        alert("Chưa có mã nào");

        return;

    }

    html5QrCode.stop();

    const ws = XLSX.utils.json_to_sheet(data.map(item=>({

        "Số thứ tự":item.stt,
        "Ngày giờ":item.time,
        "Mã đơn":item.code

    })));

    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb,ws,"Danh sách");

    XLSX.writeFile(wb,filename);

    alert("Đã tải file");

    reader.style.display="none";
    status.style.display="none";
    qrListContainer.style.display="none";
    menuContainer.style.display="block";

};

</script>
