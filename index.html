<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quay Video Đóng Hàng</title>

<style>
body{
margin:0;
padding:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
background:#000;
}

#reader{
width:100%;
height:auto;
position:relative;
}

#status{
color:white;
font-size:18px;
margin-top:10px;
text-align:center;
}

#video-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
color:white;
font-size:20px;
display:flex;
align-items:flex-end;
padding:10px;
box-sizing:border-box;
}
</style>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<div id="reader"></div>
<div id="status">Đang chờ quét QR...</div>

<script>

const status = document.getElementById('status');
const reader = document.getElementById('reader');

let html5QrCode;
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;
let lastQRCode = null;
let currentQRCode = null;
let videoElement;
let stream;

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function createBeep(){

if(audioCtx.state === 'suspended'){
await audioCtx.resume();
}

const oscillator = audioCtx.createOscillator();
const gainNode = audioCtx.createGain();

oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);

oscillator.type = 'square';
oscillator.frequency.value = 1000;
gainNode.gain.value = 0.5;

oscillator.start();

setTimeout(()=>{
oscillator.stop();
},200);

}

async function startScanner(){

html5QrCode = new Html5Qrcode("reader");

const config = { fps:10, qrbox:{ width:250, height:250 } };

try{

await html5QrCode.start(
{ facingMode:"environment" },
config,
onScanSuccess,
onScanFailure
);

videoElement = reader.querySelector('video');
stream = videoElement.captureStream();

const overlay = document.createElement('div');
overlay.id = 'video-overlay';
reader.appendChild(overlay);

status.textContent = 'Đang chờ quét QR...';

}catch(err){

status.textContent = 'Lỗi khởi động camera: ' + err.message;

}

}

function onScanSuccess(decodedText){

currentQRCode = decodedText;

if(currentQRCode !== lastQRCode){

createBeep();

if(isRecording){
stopRecording();
}

lastQRCode = currentQRCode;

setTimeout(()=>{
startRecording();
},200);

status.textContent = 'Đang ghi video với mã: ' + currentQRCode;

updateOverlay();

}

}
function onScanFailure(error){
}

function updateOverlay(){

const overlay = document.getElementById('video-overlay');

if(overlay){

if(isRecording){

const now = new Date();
const dateTime = now.toLocaleString('vi-VN');

overlay.textContent = dateTime + " - Mã: " + (lastQRCode || "");

}else{

overlay.textContent = "";

}

requestAnimationFrame(updateOverlay);

}

}

function startRecording(){

recordedChunks = [];

mediaRecorder = new MediaRecorder(stream);

mediaRecorder.ondataavailable = (event)=>{
if(event.data.size > 0){
recordedChunks.push(event.data);
}
};

mediaRecorder.onstop = saveVideo;

mediaRecorder.start();

isRecording = true;

}

function stopRecording(){

mediaRecorder.stop();

isRecording = false;

}

function saveVideo(){

const blob = new Blob(recordedChunks,{ type:'video/webm' });

const url = URL.createObjectURL(blob);

const a = document.createElement('a');

a.style.display='none';
a.href=url;
a.download='video_'+ new Date().toISOString()+'.webm';

document.body.appendChild(a);

a.click();

setTimeout(()=>{

document.body.removeChild(a);

URL.revokeObjectURL(url);

status.textContent='Video đã tải về bộ nhớ điện thoại. Quét QR tiếp theo để bắt đầu.';

},100);

}

document.addEventListener('touchend',()=>{

if(audioCtx.state === 'suspended'){
audioCtx.resume();
}

},{ once:true });

startScanner();

</script>

</body>
</html>
